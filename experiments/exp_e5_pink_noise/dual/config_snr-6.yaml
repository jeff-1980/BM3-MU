name: exp_e5_dual_pink_snr-6

# ── data ──────────────────────────────────────────────────────────
data_dir: data/cwru_12k_de
channels: [DE, FE]         # dual-sensor: drive-end + fan-end
win_len: 2048
stride: 1024
val_ratio: 0.2
batch_size: 64
num_workers: 4

# ── model ─────────────────────────────────────────────────────────
d_model: 64
d_state: 128
n_layers: 4
n_classes: 4
conv_stride: 2
# n_sensors auto-inferred from len(channels) = 2

# ── training ──────────────────────────────────────────────────────
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
scheduler: cosine

# ── loss ──────────────────────────────────────────────────────────
noise_snr_db: -6.0
noise_type: pink
lambda_kin: 0.0            # CE-only; compare with single-sensor exp_e5_single_pink_snr-6
kin_variant: cover

# ── experiment ────────────────────────────────────────────────────
seeds: [0, 1, 2, 3, 4]
results_dir: results/exp_e5_dual_pink_snr-6
