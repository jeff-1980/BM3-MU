name: exp_e1_xjtu_cross_dual_bm2_newseed
mode: cross
backbone: mamba2
# ⚠️ requires experiments/exp_xjtu/train.py::build_model mamba2 dispatch patch
# (added this task — see e1_config_audit.md for exact diff)

# ── data ──────────────────────────────────────────────────────────
# 通道/数据段逐字仿 experiments/exp_xjtu/config_cross_dual_nokin.yaml
data_root: ~/data_xjtu/XJTU-SY_Bearing_Datasets
train_condition: "37.5Hz11kN"   # Cond2: 2250rpm
test_condition:  "40Hz10kN"     # Cond3: 2400rpm
window_size: 2048
n_sensors: 2          # horizontal + vertical (B4-5 dual-channel)
# ⚠️ Cond2 OR:IR ≈ 7.4:1 → DataLoader uses WeightedRandomSampler

# ── model ─────────────────────────────────────────────────────────
d_model: 64
d_state: 128
n_layers: 4
n_classes: 2          # OR=0, IR=1
conv_stride: 2

# ── training ──────────────────────────────────────────────────────
batch_size: 64
num_workers: 4
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-4
grad_clip: 1.0
scheduler: cosine

# ── loss ──────────────────────────────────────────────────────────
# Mamba-2 无 RoPE/theta/DT 激活，L_kin 架构不支持（D19）；
# exp_xjtu/train.py L191 (patched): do_kin = (lambda_kin>0) and (backbone not in
# ("cnn1d","transformer1d","mamba2")) — 因此本臂只跑 nokin，不新写 kin 配置。
lambda_kin: 0.0
kin_variant: cover

# ── ⚠️ XJTU fs_eff assert (D26 mandatory) ─────────────────────────
fs_eff: 12800.0

# ── experiment ────────────────────────────────────────────────────
seeds: [5, 6, 7]
results_dir: results/exp_e1_xjtu_cross_dual_bm2_newseed
